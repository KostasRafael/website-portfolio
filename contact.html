<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Konstantinos Rafael Manousoudakis</title>
  <link rel="stylesheet" type="text/css"
    href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
  <link rel="stylesheet" type="text/css" href="css/style.production.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
  <header class="page-header">
    <img class="page-header__item logo" src="./img/logo.png" alt="My logo">
    <nav class="page-header__item">
      <ul role="menubar" class="navigation-list">
        <li role="presentation">
          <a href="index.html" role="menuitem" class="navigation-list__item">Home</a>
        </li>
        <li role="presentation">
          <a href="about.html" role="menuitem" class="navigation-list__item navigation-list__item--active">About
            Me</a>
        </li>
        <li class="active" role="presentation">
          <a href="contact.html" role="menuitem" class="navigation-list__item navigation-list__item--active">Contact</a>
        </li>
        <li role="presentation">
          <a href="./work.html" role="menuitem" class="navigation-list__item navigation-list__item--active">My
            Work</a>
        </li>
      </ul>
    </nav>
  </header>

  <div id="contact-container">
    <h1 class="contact-heading">Send me an email!</h1>
    <form id="contact-form" action="https://www.my-portfolio.com/my-messages" method="post">
      <label class="contact-labels" for="email">Email:</label>
      <input class="contact-inputs" type="email" id="email" placeholder="your email (required)" required><br>
      <label class="contact-labels" for="tel">Telephone:</label>
      <input class="contact-inputs" type="tel" id="tel" placeholder="your telephone (optional)"><br>
      <label class="contact-labels" for="text-message">Message:</label>
      <textarea maxlength="240" id="text-message" placeholder="your message (required)" required></textarea><br>
      <input type="submit" value="Send message">
    </form>

    <footer>
      <br>
      <br>
      <h1 class="contact-heading">Find me on</h1>
      <a><img class="footer-icons" src="img/facebook.png" alt="facebook icon"></a>
      <a><img class="footer-icons" src="img/instagram.jpg" alt="instagram icon"></a>
      <a><img class="footer-icons" src="img/twitter.png" alt="twitter icon"></a>
      <a> <img class="footer-icons" src="img/linkedin.png" alt="linkedin icon"></a>
      <a> <img class="footer-icons" src="img/medium.jpg" alt="linkedin icon"></a>
    </footer>
  </div>

  <script src="js/tota11y.min.js"></script>
</body>

</html>
